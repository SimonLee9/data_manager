# Copy to ~/.sn2_backup/config.yaml on the robot and edit as needed.

data_root: /home/rainbow/data/sn2_log

# Optional. If empty, robot_id is auto-resolved:
#   1. dmidecode -s system-serial-number  (if it returns a meaningful value)
#   2. last 6 hex chars of the primary MAC, prefixed "robot-"
#   3. hostname
robot_id:

# Send a one-time email on the first cycle telling you which robot_id this
# robot is using. Highly recommended.
robot_id_announce_once: true

drive:
  # Personal Drive folder under which <robot_id>/<original-relative-path>
  # is mirrored. The folder must already exist and the OAuth-authorized
  # account must have edit access to it.
  parent_folder_id: 1be9aQXP0d-CcFL9CQdrwj5OtQcYbamex
  credentials_path: ~/.sn2_backup/credentials.json   # OAuth client secret (from Google Cloud Console)
  token_path:       ~/.sn2_backup/token.json          # generated by scripts/authorize_drive.py

email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  username: lbj142632@gmail.com
  # The actual password is read from this environment variable, not stored in YAML.
  # Set it via systemd EnvironmentFile (~/.sn2_backup/env, mode 600).
  app_password_env: SN2_BACKUP_APP_PASSWORD
  to: lbj142632@gmail.com
  on_failure: true
  on_new_error_log: true

scanner:
  # Files whose mtime is younger than this are skipped (still being written).
  # bbx CSVs rotate every ~2 minutes, so 300s comfortably excludes the live one.
  mtime_quiet_seconds: 300
  exclude_globs: []
  # Files matching these patterns BYPASS the mtime quiet guard so the running
  # daily log gets mirrored to Drive throughout the day instead of waiting
  # until midnight rotation. They still go through the size+mtime dedup, so
  # only actually-changed bytes trigger a re-upload.
  always_upload_globs:
    - "snlog/snlog_*.log"
    - "snlog/*-log-list.html"
